# FlowCompression 训练配置文件
# 使用方法: python train.py --config config/train_config.yaml

# ==================== 路径配置 ====================
paths:
  model_name: "flux.2-klein-4b"
  flux_ckpt: "/data2/luosheng/hf_models/hub/FLUX.2-klein-4B/flux-2-klein-4b.safetensors"
  ae_ckpt: "/data2/luosheng/hf_models/hub/FLUX.2-klein-4B/ae.safetensors"
  qwen_ckpt: "/data2/luosheng/hf_models/hub/FLUX.2-klein-4B/tokenizer"        # Qwen tokenizer 路径（始终需要）
  qwen_model_path: "/data2/luosheng/hf_models/hub/FLUX.2-klein-4B/text_encoder"  # Qwen 模型权重路径（始终需要，缓存后释放）
  elic_ckpt: "/data2/luosheng/code/DiT-IC/checkpoints/elic_official.pth"
  clip_ckpt: "/data2/luosheng/hf_models/hub/clip-vit-base-patch32"
  train_root: "/data2/luosheng/code/flux2/datasets/train"
  val_root: "/data2/luosheng/data/Datasets/Kodak"
  output_dir: "./outputs/"

# ==================== 模型配置 ====================
# use_text_condition 控制文本条件内容：
#   false → 编码空字符串 "" 作为 Flux 条件（节省约 1GB 编码计算，推荐调试用）
#   true  → 编码固定 prompt "Lossless quality, artifact-free, ..." 作为条件（语义更丰富，推荐正式训练）
# 注意：两种模式均会在训练开始时加载 Qwen encoder、建立缓存后立即释放，不影响训练显存
model:
  use_text_condition: true  # ← 改为 false 切换到空文本模式

# ==================== GPU 配置 ====================
gpu:
  cuda_visible_devices: "1"  # 使用的 GPU 设备ID，逗号分隔
  mixed_precision: "bf16"           # 混合精度类型: "no", "fp16", "bf16"
  main_port: 29500                  # 分布式训练主端口

# ==================== 数据配置 ====================
data:
  image_size: 256
  batch_size: 2
  num_workers: 4

# ==================== 训练配置 ====================
training:
  max_steps: 200000
  lr: 1.0e-5
  weight_decay: 0.0
  grad_clip: 1.0
  seed: 42
  gradient_accumulation_steps: 2
  train_schedule_steps: 1000  

# ==================== Codec 配置 ====================
codec:
  ch_emd: 128        # Flux AE Main Enc 输出通道
  channel: 320       # ELIC Aux Enc 输出通道
  channel_out: 128   # 匹配 Flux AE Latent 通道
  num_slices: 5

# ==================== LoRA 配置 ====================
lora:
  enabled: true
  rank: 32
  alpha: 32.0
  dropout: 0.0
  target_regex: ".*"  # 正则表达式，匹配所有 Linear 层

# ==================== 损失函数权重 ====================
loss:
  lambda_rate: 0.08
  d1_mse: 2.0
  d2_lpips: 1.0
  d3_clip: 0.1

# ==================== 日志与保存 ====================
logging:
  use_tensorboard: true
  log_every: 20          # 每 N 步打印日志
  eval_every: 2000        # 每 N 步验证
  save_every: 20000       # 每 N 步保存 checkpoint
  eval_batches: 50       # 验证时使用的 batch 数量
  save_log_file: true    # 是否保存日志文件

# ==================== 恢复训练 ====================
resume:
  enabled: false
  checkpoint_path: ""    # 如果为空，自动查找最新的 checkpoint
